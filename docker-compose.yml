services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,CONTROLLER://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=qtreX9u8T623nch310vB7Q
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 1. Main Backend (Updated Path)
  main-backend:
    build: ./code_forge_backend
    container_name: main-backend
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  # 2. Java Worker
  java-worker:
    build: ./java-worker
    container_name: java-worker
    depends_on:
      kafka:
        condition: service_healthy

  # 3. Node Worker
  node-worker:
    build: ./node_worker
    container_name: node-worker
    depends_on:
      kafka:
        condition: service_healthy

  # 4. Python Worker
  python-worker:
    build: ./python_worker
    container_name: python-worker
    depends_on:
      kafka:
        condition: service_healthy
